<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        h1{
            margin-bottom: 20px;
        }
        body{
            padding: 20px;
            height: 100vh;
            justify-items: center;
            align-content: center;
            background-color: #CE8B44;
            color: beige;

        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20%;
            gap: 10px;
        }
        input{
            padding-left: 5px;
            padding: 5px;
        }
        button{
            margin-top: 10px;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background-color: #932E2E;
            color: beige;
        }

    </style>
</head>
<body>
    <h1>CADASTRO</h1>
    <form action="/cadastro", method="post">
        
        <label>Usuário:</label>
        <input type="text" name="usuario">
        
        <label>Senha:</label>
        <input type="password" name="senha">
        
        <label>Nome:</label>
        <input type="text" name="nome">
        <button type="submit">Cadastre-se</button>
    </form>
</body>
</html>
